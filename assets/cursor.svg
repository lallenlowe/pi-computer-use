<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
	<defs>
		<linearGradient id="cursorFill" x1="10%" y1="0%" x2="90%" y2="100%">
			<stop offset="0%" stop-color="#FFE39C"/>
			<stop offset="30%" stop-color="#FF8C42"/>
			<stop offset="65%" stop-color="#E94F8B"/>
			<stop offset="100%" stop-color="#7B2D9F"/>
		</linearGradient>
		<filter id="cursorShadow" x="-30%" y="-30%" width="160%" height="160%">
			<feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000" flood-opacity="0.4"/>
		</filter>
	</defs>
	<!--
		Paper-airplane cursor matching the reference. Three rounded
		corners and asymmetric edges that produce the airplane look:
		  V0 (4, 4)        top-left tip       (small round)
		  V1 (28, 16)      far-right shoulder (large round)
		  V2 (15, 28)      bottom tail        (large round)
		Edges:
		  V0 \u2192 V1   convex (bulges up/right) \u2014 leading edge
		  V1 \u2192 V2   deeply concave (sweeps in toward centroid) \u2014
		             this is the airplane fold/notch
		  V2 \u2192 V0   nearly straight, very gently concave \u2014
		             trailing fuselage edge
	-->
	<path
		d="
		   M 5.0 5.0
		   Q 18 9, 25.4 14.8
		   Q 28 16, 25.6 17.4
		   Q 18 19, 16.5 24.4
		   Q 15 28, 13.4 24.4
		   Q 10 16, 4.6 5.4
		   Q 4 4, 5.0 5.0
		   Z
		"
		fill="url(#cursorFill)"
		stroke="white"
		stroke-width="1.4"
		stroke-linejoin="round"
		stroke-linecap="round"
		filter="url(#cursorShadow)"
	/>
</svg>
